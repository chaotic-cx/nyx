name: Bump package group
on:
  workflow_call:
    inputs:
      bumpWhat:
        description: What do you want to bump (JSON array)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      bumpWhat:
        description: What do you want to bump (JSON array)
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.bumpWhat }}
  cancel-in-progress: true

jobs:
  group-bump:
    name: Bump package group
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      # identical to build.yml
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            sandbox-fallback = false
            system-features = big-parallel gccarch-x86-64-v3
          install_options: --daemon
      - name: Checkout
        uses: actions/checkout@v6
      # config to commit
      - name: Bat-signal
        run: |
          set -e
          git config --global user.name 'Chaotic Github Actions'
          git config --global user.email 'actions@chaotic.cx'
      - name: Update, Rebase & PR
        run: |
          set -euo pipefail

          # Extract the first package name to use for branches, commits, and PRs
          FIRST_PKG=$(echo "$TARGETPKG" | jq -r '.[0]')
          BRANCH_NAME="bump/${FIRST_PKG}"

          # Create and switch to the bump branch BEFORE running scripts
          # so auto-commits go straight onto this branch
          git checkout -b "$BRANCH_NAME"

          # Record the state of the branch before updates
          START_COMMIT=$(git rev-parse HEAD)

          # Loop through every package in the JSON array and run its update script
          for PKG in $(echo "$TARGETPKG" | jq -r '.[]'); do
            echo "Running updateScript for $PKG..."
            nix build ".#${PKG}.updateScript"
            bash ./result
          done

          # Catch-all: Stage and commit anything if a script didn't auto-commit
          git add -A
          if ! git diff --staged --quiet; then
            echo "Committing unstaged changes..."
            git commit -m "chore: bump ${FIRST_PKG} (and group)"
          fi

          # Record the state of the branch after updates
          END_COMMIT=$(git rev-parse HEAD)

          # Check against main: Did the commit hash change?
          if [ "$START_COMMIT" = "$END_COMMIT" ]; then
            echo "${FIRST_PKG} (and its group) is already up to date. No bump needed!"
            exit 0
          fi

          # Check against remote branch: Is this exact state already pushed?
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null; then
            echo "Branch $BRANCH_NAME exists remotely. Fetching to compare..."
            git fetch origin "$BRANCH_NAME"

            # Compare the actual file tree of our new HEAD to the remote branch.
            # This ignores commit timestamps and checks if the code is exactly the same.
            if git diff HEAD "origin/$BRANCH_NAME" --quiet; then
              echo "The exact same update is already pushed. Avoiding noisy force-push!"
              exit 0
            fi
            echo "Differences found. Proceeding to push..."
          fi

          # Force push to the branch
          git push origin "$BRANCH_NAME" --force

          # Check if the PR is already open
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --state open --json number | jq length)

          # Create the PR and trigger the merge queue
          if [ "$PR_EXISTS" -eq 0 ]; then
            echo "Creating a new PR for ${FIRST_PKG}..."
            gh pr create \
              --title "chore: bump ${FIRST_PKG}" \
              --body "Automated package bump for \`${TARGETPKG}\`." \
              --head "$BRANCH_NAME" \
              --base main
          else
            echo "PR already exists. It has now been cleanly rebased and updated!"
          fi

          # Trigger auto-merge for the PR using a standard merge commit
          gh pr merge "$BRANCH_NAME" --auto --merge
        env:
          GH_TOKEN: ${{ github.token }}
          TARGETPKG: ${{ inputs.bumpWhat }}
