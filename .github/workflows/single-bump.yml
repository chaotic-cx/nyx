name: Bump one package
on:
  workflow_dispatch:
    inputs:
      bumpWhat:
        description: What do you want to bump
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nyx-single-bump
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
          install_options: --daemon
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          set -e
          git config --global user.name 'loner'
          git config --global user.email '2788892716@qq.com'
      # the bump itself
      - name: Bump package
        run: |
          git checkout -b "bump-${TARGETPKG}-$(date '+%Y%m%d')"
          nix build ".#${TARGETPKG}.updateScript"
          bash ./result
          git push origin "bump-${TARGETPKG}-$(date '+%Y%m%d')" -u
        env:
          GH_TOKEN: ${{ github.token }}
          TARGETPKG: ${{ inputs.bumpWhat }}
