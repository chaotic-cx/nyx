name: Bump all packages

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-matrix
  cancel-in-progress: true

jobs:
  prepare-bump-matrix:
    name: Generate Update Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      # identical to build.yml
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            sandbox-fallback = false
            system-features = big-parallel gccarch-x86-64-v3
          install_options: --daemon

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build and extract matrix
        id: set-matrix
        run: |
          # Build the derivation and capture the resulting store path
          OUT_PATH=$(nix build --no-link --print-out-paths ./maintenance#chaotic-nyx.bump-matrix)

          #  Read the contents of the generated file
          MATRIX_JSON=$(jq -c . "$OUT_PATH")

          # Write to GitHub step outputs
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  run-bump-matrix:
    name: Bump ${{ matrix.packages }}
    needs: prepare-bump-matrix
    strategy:
      fail-fast: false # Ensure one package group failing doesn't cancel all other bumps
      matrix:
        packages: ${{ fromJson(needs.prepare-bump-matrix.outputs.matrix) }}

    # Call your existing reusable workflow
    uses: ./.github/workflows/group-bump.yml
    with:
      bumpWhat: ${{ toJSON(matrix.packages) }}
    secrets: inherit # Pass secrets down if single-bump.yml needs a GH_TOKEN for PRs
